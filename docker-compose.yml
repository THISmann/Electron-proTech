# proTech Solaire – Stack WordPress (Traefik, Nginx, PHP-FPM, MariaDB, Redis)
# Utilisé en local et déployé sur la VM Azure via GitHub Actions.

services:
  traefik:
    image: traefik:v3
    restart: unless-stopped
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    depends_on:
      - wordpress
    volumes:
      - ./docker/nginx/wordpress.conf:/etc/nginx/conf.d/default.conf:ro
      - wordpress_data:/var/www/html
      - ./wp-content/themes/astra-child-protech:/var/www/html/wp-content/themes/astra-child-protech:ro
    environment:
      - NGINX_HOST=_
      - NGINX_PORT=80
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nginx.rule=PathPrefix(`/`)"
      - "traefik.http.services.nginx.loadbalancer.server.port=80"

  wordpress:
    image: wordpress:6.7-php8.3-fpm-alpine
    restart: unless-stopped
    depends_on:
      - mariadb
      - redis
    env_file: .env
    environment:
      WORDPRESS_DB_HOST: mariadb:3306
      WP_REDIS_HOST: redis
      WP_REDIS_PORT: "6379"
      SITE_URL: ${SITE_URL:-}
    volumes:
      - wordpress_data:/var/www/html
      - ./wp-content/themes/astra-child-protech:/var/www/html/wp-content/themes/astra-child-protech:ro
      - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins:ro
    networks:
      - default

  mariadb:
    image: mariadb:11
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_DATABASE: ${WORDPRESS_DB_NAME:-wordpress}
      MYSQL_USER: ${WORDPRESS_DB_USER:-wordpress}
      MYSQL_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - default

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - default

  wp-cli:
    image: wordpress:cli-php8.3
    profiles:
      - tools
    env_file: .env
    environment:
      WORDPRESS_DB_HOST: mariadb:3306
    volumes:
      - wordpress_data:/var/www/html
      - ./wp-content/themes/astra-child-protech:/var/www/html/wp-content/themes/astra-child-protech
    depends_on:
      - mariadb
    user: "33:33"
    command: tail -f /dev/null
    networks:
      - default

networks:
  default:
    driver: bridge

volumes:
  wordpress_data:
  wordpress_uploads:
  mariadb_data:
