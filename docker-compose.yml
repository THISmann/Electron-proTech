# proTech Solaire – Stack WordPress (Traefik v3 + WordPress FPM + Nginx + MariaDB 11 + Redis)
# Lancer : docker compose up -d
# Site : http://localhost (ou http://protech.local si configuré en hosts)

services:
  traefik:
    image: traefik:v3.4
    container_name: protech-traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - protech
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: protech-nginx
    volumes:
      - wordpress_data:/var/www/html:ro
      - ./wp-content/themes/astra-child-protech:/var/www/html/wp-content/themes/astra-child-protech:ro
      - ./docker/nginx/wordpress.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - wordpress
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.protech.rule=PathPrefix(`/`)"
      - "traefik.http.routers.protech.entrypoints=web"
      - "traefik.http.services.protech.loadbalancer.server.port=80"
    networks:
      - protech
    restart: unless-stopped

  wordpress:
    image: wordpress:php8.3-fpm-alpine
    container_name: protech-wordpress
    env_file:
      - .env
    environment:
      WORDPRESS_DB_HOST: mariadb
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:?Set WORDPRESS_DB_PASSWORD in .env}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-wordpress}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX:-wp_}
    volumes:
      - wordpress_data:/var/www/html
      - ./wp-content/themes/astra-child-protech:/var/www/html/wp-content/themes/astra-child-protech
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - protech
    restart: unless-stopped

  mariadb:
    image: mariadb:11
    container_name: protech-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      MARIADB_DATABASE: ${WORDPRESS_DB_NAME:-wordpress}
      MARIADB_USER: ${WORDPRESS_DB_USER:-wordpress}
      MARIADB_PASSWORD: ${WORDPRESS_DB_PASSWORD:?Set WORDPRESS_DB_PASSWORD in .env}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - protech
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: protech-redis
    networks:
      - protech
    restart: unless-stopped

  # Service pour WP-CLI (install plugins, thèmes, créer pages)
  wp-cli:
    image: wordpress:cli-2-php8.3
    container_name: protech-wp-cli
    working_dir: /var/www/html
    env_file:
      - .env
    environment:
      WORDPRESS_DB_HOST: mariadb
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:?Set WORDPRESS_DB_PASSWORD in .env}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-wordpress}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX:-wp_}
    volumes:
      - wordpress_data:/var/www/html
      - ./wp-content/themes/astra-child-protech:/var/www/html/wp-content/themes/astra-child-protech
      - .:/app:ro
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - protech
    profiles:
      - tools

volumes:
  wordpress_data:
  mariadb_data:

networks:
  protech:
    driver: bridge
