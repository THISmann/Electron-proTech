name: CI/CD — Docker Compose to Azure VM

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Optional environment override: test or production'
        required: false
        default: ''

jobs:
  deploy:
    name: Deploy to Azure VM
    runs-on: ubuntu-latest
    env:
      AZURE_HOST: ${{ secrets.AZURE_HOST }}
      AZURE_KEY: ${{ secrets.AZURE_KEY }}
      AZURE_USERNAME: ${{ secrets.AZURE_USERNAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ─── Déterminer l'environnement (test ou production) ───────
      - name: Determine environment
        id: determine-env
        run: |
          if [ "${{ github.event.inputs.environment }}" != "" ]; then
            echo "env=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            echo "env=production" >> $GITHUB_OUTPUT
          else
            echo "env=test" >> $GITHUB_OUTPUT
          fi

      # ─── Préparer la clé SSH ────────────────────────────────────
      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ env.AZURE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ env.AZURE_HOST }} >> ~/.ssh/known_hosts

      # ─── Créer le .env sur la VM selon l'environnement ─────────
      - name: Create .env on VM
        run: |
          if [ "${{ steps.determine-env.outputs.env }}" = "production" ]; then
            ssh ${{ env.AZURE_USERNAME }}@${{ env.AZURE_HOST }} "cat > ~/app/.env << 'EOF'
          WORDPRESS_DB_USER=${{ secrets.PROD_DB_USER }}
          WORDPRESS_DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}
          WORDPRESS_DB_NAME=${{ secrets.PROD_DB_NAME }}
          MYSQL_ROOT_PASSWORD=${{ secrets.PROD_MYSQL_ROOT_PASSWORD }}
          WORDPRESS_TABLE_PREFIX=wp_
          EOF"
          else
            ssh ${{ env.AZURE_USERNAME }}@${{ env.AZURE_HOST }} "cat > ~/app/.env << 'EOF'
          WORDPRESS_DB_USER=${{ secrets.TEST_DB_USER }}
          WORDPRESS_DB_PASSWORD=${{ secrets.TEST_DB_PASSWORD }}
          WORDPRESS_DB_NAME=${{ secrets.TEST_DB_NAME }}
          MYSQL_ROOT_PASSWORD=${{ secrets.TEST_MYSQL_ROOT_PASSWORD }}
          WORDPRESS_TABLE_PREFIX=wp_
          EOF"
          fi

      # ─── Copier les fichiers du projet sur la VM ────────────────
      - name: Copy project files to VM
        run: |
          ENV=${{ steps.determine-env.outputs.env }}
          REMOTE_DIR="/home/${{ env.AZURE_USERNAME }}/app"

          # Créer la structure des dossiers sur la VM
          ssh ${{ env.AZURE_USERNAME }}@${{ env.AZURE_HOST }} "
            mkdir -p ${REMOTE_DIR}/docker/nginx
            mkdir -p ${REMOTE_DIR}/wp-content/themes/astra-child-protech
          "

          # Copier docker-compose.yml
          scp docker-compose.yml \
            ${{ env.AZURE_USERNAME }}@${{ env.AZURE_HOST }}:${REMOTE_DIR}/docker-compose.yml

          # Copier l'override d'environnement si présent
          if [ -f "docker-compose.${ENV}.yml" ]; then
            scp docker-compose.${ENV}.yml \
              ${{ env.AZURE_USERNAME }}@${{ env.AZURE_HOST }}:${REMOTE_DIR}/docker-compose.${ENV}.yml
          fi

          # Copier la config Nginx
          scp docker/nginx/wordpress.conf \
            ${{ env.AZURE_USERNAME }}@${{ env.AZURE_HOST }}:${REMOTE_DIR}/docker/nginx/wordpress.conf

          # Copier le thème enfant
          scp -r wp-content/themes/astra-child-protech \
            ${{ env.AZURE_USERNAME }}@${{ env.AZURE_HOST }}:${REMOTE_DIR}/wp-content/themes/

      # ─── Déployer sur la VM ─────────────────────────────────────
      - name: Deploy stack on VM
        run: |
          ENV=${{ steps.determine-env.outputs.env }}
          REMOTE_DIR="/home/${{ env.AZURE_USERNAME }}/app"

          ssh ${{ env.AZURE_USERNAME }}@${{ env.AZURE_HOST }} "
            cd ${REMOTE_DIR}

            # Puller les nouvelles images officielles
            if [ -f docker-compose.${ENV}.yml ]; then
              docker compose -f docker-compose.yml -f docker-compose.${ENV}.yml pull
              docker compose -f docker-compose.yml -f docker-compose.${ENV}.yml up -d --remove-orphans
            else
              docker compose pull
              docker compose up -d --remove-orphans
            fi

            # Nettoyage des images inutilisées
            docker image prune -f

            echo '✅ Stack ${ENV} déployée'
            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
          "

      # ─── Health check ───────────────────────────────────────────
      - name: Health check
        run: |
          echo "⏳ Attente démarrage des containers (20s)..."
          sleep 20
          curl -f -s -o /dev/null -w "%{http_code}" http://${{ env.AZURE_HOST }} | grep -q "200\|301\|302" \
            && echo "✅ Site accessible" \
            || echo "⚠️  Site pas encore accessible (normal au 1er déploiement)"

      # ─── Notification ───────────────────────────────────────────
      - name: Notify
        run: |
          echo "✅ Deployed [${{ steps.determine-env.outputs.env }}] on ${{ env.AZURE_HOST }}"
          echo "🌐 http://${{ env.AZURE_HOST }}"