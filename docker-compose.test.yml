version: '3.8'

# Example test compose that uses environment variable substitution.
# It mirrors docker-compose.production.yml but exposes the app on 8080 locally
# so you can run test and prod concurrently on the same host if needed.

services:
  app:
    image: "${DOCKERHUB_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - ENVIRONMENT=test
      - NODE_ENV=development
    # volumes:
    #   - ./data:/data

networks:
  default:
    driver: bridge
