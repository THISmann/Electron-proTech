name: CI/CD — Docker Compose to Azure VM

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Optional environment override: test or production'
        required: false
        default: ''

env:
  IMAGE_NAME: "${{ github.event.repository.name }}"

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_REGISTRY: ${{ secrets.DOCKERHUB_REGISTRY }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
    outputs:
      image_tag: ${{ steps.set-tag.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine environment (test vs production)
        id: determine-env
        run: |
          if [ "${{ github.event.inputs.environment }}" != "" ]; then
            env_name="${{ github.event.inputs.environment }}"
          elif [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            env_name=production
          else
            env_name=test
          fi
          echo "env=${env_name}" >> $GITHUB_OUTPUT

      - name: Set image tag
        id: set-tag
        run: |
          short_sha=$(echo "${GITHUB_SHA}" | cut -c1-7)
          if [ "${{ steps.determine-env.outputs.env }}" = "test" ]; then
            tag="${short_sha}"
          else
            tag="prod-${GITHUB_RUN_NUMBER}"
          fi
          echo "image_tag=${tag}" >> $GITHUB_OUTPUT

      - name: Login to registry (Docker Hub)
        uses: docker/login-action@v4
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ env.DOCKERHUB_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.set-tag.outputs.image_tag }}

  deploy:
    name: Deploy to Azure VM
    runs-on: ubuntu-latest
    needs: build
    env:
      AZURE_HOST: ${{ secrets.AZURE_HOST }}
      AZURE_KEY: ${{ secrets.AZURE_KEY }}
      AZURE_USERNAME: ${{ secrets.AZURE_USERNAME }}
      DOCKERHUB_REGISTRY: ${{ secrets.DOCKERHUB_REGISTRY }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
    steps:
      - name: Checkout (to get compose and scripts)
        uses: actions/checkout@v4

      - name: Determine environment for deploy
        id: determine-deploy-env
        run: |
          if [ "${{ github.event.inputs.environment }}" != "" ]; then
            echo "env=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            echo "env=production" >> $GITHUB_OUTPUT
          else
            echo "env=test" >> $GITHUB_OUTPUT
          fi

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ env.AZURE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ env.AZURE_HOST }} >> ~/.ssh/known_hosts

      - name: Copy compose files and deploy script to VM
        run: |
          REMOTE_DIR="/home/${{ env.AZURE_USERNAME }}/deploy"
          ssh ${{ env.AZURE_USERNAME }}@${{ env.AZURE_HOST }} "mkdir -p ${REMOTE_DIR}"
          scp docker-compose.yml ${{ env.AZURE_USERNAME }}@${{ env.AZURE_HOST }}:${REMOTE_DIR}/docker-compose.yml
          if [ -f "docker-compose.${{ steps.determine-deploy-env.outputs.env }}.yml" ]; then
            scp docker-compose.${{ steps.determine-deploy-env.outputs.env }}.yml ${{ env.AZURE_USERNAME }}@${{ env.AZURE_HOST }}:${REMOTE_DIR}/
          fi
          scp scripts/remote-deploy.sh ${{ env.AZURE_USERNAME }}@${{ env.AZURE_HOST }}:${REMOTE_DIR}/remote-deploy.sh

      - name: Execute remote deploy
        env:
          ENVIRONMENT: ${{ steps.determine-deploy-env.outputs.env }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          REMOTE_DIR="/home/${{ env.AZURE_USERNAME }}/deploy"
          ssh ${{ env.AZURE_USERNAME }}@${{ env.AZURE_HOST }} "chmod +x ${REMOTE_DIR}/remote-deploy.sh && cd ${REMOTE_DIR} && \
            DOCKERHUB_REGISTRY='${{ env.DOCKERHUB_REGISTRY }}' \
            DOCKERHUB_USERNAME='${{ env.DOCKERHUB_USERNAME }}' \
            DOCKERHUB_PASSWORD='${{ env.DOCKERHUB_PASSWORD }}' \
            IMAGE_NAME='${{ env.IMAGE_NAME }}' \
            IMAGE_TAG='${{ needs.build.outputs.image_tag }}' \
            ENVIRONMENT='${{ steps.determine-deploy-env.outputs.env }}' \
            ./remote-deploy.sh"

      - name: Notify
        run: |
          echo "Deployed ${{ steps.determine-deploy-env.outputs.env }} - image: ${{ env.DOCKERHUB_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}"
