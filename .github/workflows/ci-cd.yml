# CI/CD — Déploiement sur VM Azure (test ou production)
# - develop → déploiement TEST (port 8080)
# - main → déploiement PRODUCTION (port 80)
# Secrets utilisés : AZURE_HOST, AZURE_KEY, AZURE_USERNAME
# Optionnel : TEST_* / PROD_* (DB), WORDPRESS_ADMIN_PASSWORD, WORDPRESS_ADMIN_EMAIL (1ère install)

name: CI/CD — Deploy to Azure VM

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: "Environnement : test ou production"
        required: true
        default: "test"
        type: choice
        options:
          - test
          - production

jobs:
  deploy:
    name: Deploy (${{ github.ref_name }})
    runs-on: ubuntu-latest
    env:
      AZURE_HOST: ${{ secrets.AZURE_HOST }}
      AZURE_KEY: ${{ secrets.AZURE_KEY }}
      AZURE_USERNAME: ${{ secrets.AZURE_USERNAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "env=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "env=production" >> $GITHUB_OUTPUT
          else
            echo "env=test" >> $GITHUB_OUTPUT
          fi
          echo "Deploying environment: $(cat $GITHUB_OUTPUT | grep '^env=' | cut -d= -f2)"

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$AZURE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$AZURE_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Create .env on runner and copy to VM
        env:
          ENV: ${{ steps.env.outputs.env }}
        run: |
          if [ "$ENV" = "production" ]; then
            MYSQL_ROOT="${{ secrets.PROD_MYSQL_ROOT_PASSWORD }}"
            DB_USER="${{ secrets.PROD_DB_USER }}"
            DB_PASSWORD="${{ secrets.PROD_DB_PASSWORD }}"
            DB_NAME="${{ secrets.PROD_DB_NAME }}"
          else
            MYSQL_ROOT="${{ secrets.TEST_MYSQL_ROOT_PASSWORD }}"
            DB_USER="${{ secrets.TEST_DB_USER }}"
            DB_PASSWORD="${{ secrets.TEST_DB_PASSWORD }}"
            DB_NAME="${{ secrets.TEST_DB_NAME }}"
          fi
          # Valeurs par défaut si les secrets ne sont pas encore configurés
          MYSQL_ROOT="${MYSQL_ROOT:-protech-root-change-me}"
          DB_USER="${DB_USER:-wordpress}"
          DB_PASSWORD="${DB_PASSWORD:-protech-wp-change-me}"
          DB_NAME="${DB_NAME:-wordpress}"

          {
            echo "MYSQL_ROOT_PASSWORD=${MYSQL_ROOT}"
            echo "WORDPRESS_DB_USER=${DB_USER}"
            echo "WORDPRESS_DB_PASSWORD=${DB_PASSWORD}"
            echo "WORDPRESS_DB_NAME=${DB_NAME}"
            echo "WORDPRESS_TABLE_PREFIX=wp_"
          } > /tmp/deploy.env

          scp -o StrictHostKeyChecking=accept-new /tmp/deploy.env "$AZURE_USERNAME@$AZURE_HOST:~/app/.env"
          echo "✅ .env copié sur la VM ($ENV)"

      - name: Create directories on VM
        run: |
          ssh "$AZURE_USERNAME@$AZURE_HOST" "mkdir -p ~/app/docker/nginx ~/app/wp-content/themes ~/app/scripts ~/app/content-pages"

      - name: Copy project files to VM
        env:
          ENV: ${{ steps.env.outputs.env }}
          REMOTE: ${{ env.AZURE_USERNAME }}@${{ env.AZURE_HOST }}
        run: |
          scp -o StrictHostKeyChecking=accept-new docker-compose.yml "$REMOTE:~/app/docker-compose.yml"
          scp -o StrictHostKeyChecking=accept-new "docker-compose.${ENV}.yml" "$REMOTE:~/app/docker-compose.${ENV}.yml"
          scp -o StrictHostKeyChecking=accept-new docker/nginx/wordpress.conf "$REMOTE:~/app/docker/nginx/wordpress.conf"
          scp -o StrictHostKeyChecking=accept-new -r wp-content/themes/astra-child-protech "$REMOTE:~/app/wp-content/themes/"
          scp -o StrictHostKeyChecking=accept-new -r scripts "$REMOTE:~/app/"
          scp -o StrictHostKeyChecking=accept-new -r content-pages "$REMOTE:~/app/"
          echo "✅ Fichiers copiés (thème, scripts, content-pages)"

      - name: Ensure Docker is running on VM
        run: |
          ssh "$AZURE_USERNAME@$AZURE_HOST" "set -e
            if command -v docker >/dev/null 2>&1; then
              sudo systemctl start docker 2>/dev/null || true
              sudo systemctl enable docker 2>/dev/null || true
              sleep 2
              sudo docker info >/dev/null 2>&1 && echo '✅ Docker est prêt' || echo '⚠️ Docker installé mais service peut-être indisponible'
            else
              echo '❌ Docker n'\''est pas installé sur la VM. Installez-le (ex: curl -fsSL https://get.docker.com | sh) puis ajoutez l'\''utilisateur au groupe docker ou utilisez sudo.'
              exit 1
            fi"

      - name: Deploy stack on VM
        env:
          ENV: ${{ steps.env.outputs.env }}
        run: |
          ssh "$AZURE_USERNAME@$AZURE_HOST" "set -e
            cd ~/app
            DOCKER='sudo docker'
            if sudo docker compose version >/dev/null 2>&1; then
              COMPOSE='sudo docker compose'
            elif sudo docker-compose version >/dev/null 2>&1; then
              COMPOSE='sudo docker-compose'
            else
              COMPOSE='sudo docker compose'
            fi
            echo '📦 Pull des images...'
            \$COMPOSE -f docker-compose.yml -f docker-compose.${ENV}.yml pull --quiet
            echo '🚀 Démarrage des containers...'
            \$COMPOSE -f docker-compose.yml -f docker-compose.${ENV}.yml up -d --remove-orphans
            \$DOCKER image prune -f
            echo '✅ Stack ${ENV} déployée'
            \$DOCKER ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'"

      - name: WordPress setup and inject site content
        env:
          ENV: ${{ steps.env.outputs.env }}
          WP_ADMIN_PASSWORD: ${{ secrets.WORDPRESS_ADMIN_PASSWORD }}
          WP_ADMIN_EMAIL: ${{ secrets.WORDPRESS_ADMIN_EMAIL }}
        run: |
          if [ "$ENV" = "test" ]; then
            SITE_URL="http://$AZURE_HOST:8080"
          else
            SITE_URL="http://$AZURE_HOST"
          fi
          WP_PASS="${WP_ADMIN_PASSWORD:-ProTech-Deploy-$(openssl rand -hex 4)}"
          WP_EMAIL="${WP_ADMIN_EMAIL:-admin@protech.local}"
          ssh "$AZURE_USERNAME@$AZURE_HOST" "set -e
            cd ~/app
            COMPOSE='sudo docker compose -f docker-compose.yml -f docker-compose.${ENV}.yml --profile tools'
            RUN_WP=\"\$COMPOSE run --rm -v \$(pwd)/scripts:/app/scripts -v \$(pwd)/content-pages:/app/content-pages wp-cli\"

            echo '⏳ Attente MySQL/WordPress (30s)...'
            sleep 30

            echo '🔧 Installation WordPress (si nécessaire)...'
            if ! \$RUN_WP wp core is-installed --allow-root 2>/dev/null; then
              \$RUN_WP wp core install --url=\"$SITE_URL\" --title=\"Electron ProTech\" --admin_user=admin --admin_password=\"$WP_PASS\" --admin_email=\"$WP_EMAIL\" --skip-email --allow-root
              echo '✅ WordPress installé (admin / mot de passe dans les secrets ou logs)'
            fi

            echo '🎨 Thèmes et extensions (même conteneur pour voir le thème parent)...'
            \$RUN_WP sh -c 'wp theme install astra --activate --allow-root 2>/dev/null || true && wp theme activate astra-child-protech --allow-root && wp plugin install elementor --activate --allow-root 2>/dev/null || true'

            echo '📄 Création des pages...'
            \$RUN_WP wp post create --post_type=page --post_title='Accueil' --post_name=accueil --post_status=publish --post_content='<!-- placeholder -->' --allow-root 2>/dev/null || true
            \$RUN_WP wp post create --post_type=page --post_title='Nos réalisations' --post_name=realisations --post_status=publish --allow-root 2>/dev/null || true
            \$RUN_WP wp post create --post_type=page --post_title='Installation solaire' --post_name=installation-solaire --post_status=publish --allow-root 2>/dev/null || true
            \$RUN_WP wp post create --post_type=page --post_title='Maintenance & SAV' --post_name=maintenance-sav --post_status=publish --allow-root 2>/dev/null || true
            \$RUN_WP wp post create --post_type=page --post_title='Simulateur économies' --post_name=simulateur --post_status=publish --post_content='[protech_calculateur_economies]' --allow-root 2>/dev/null || true
            \$RUN_WP wp post create --post_type=page --post_title='Références & Témoignages' --post_name=references-temoignages --post_status=publish --allow-root 2>/dev/null || true
            \$RUN_WP wp post create --post_type=page --post_title='À propos' --post_name=a-propos --post_status=publish --allow-root 2>/dev/null || true
            \$RUN_WP wp post create --post_type=page --post_title='Contact & Devis' --post_name=contact --post_status=publish --allow-root 2>/dev/null || true
            \$RUN_WP wp post create --post_type=page --post_title='Blog' --post_name=blog --post_status=publish --allow-root 2>/dev/null || true

            ID_ACCUEIL=\$( \$RUN_WP wp post list --post_type=page --name=accueil --field=ID --format=ids --allow-root 2>/dev/null | tr -d ' ' )
            if [ -n \"\$ID_ACCUEIL\" ]; then
              \$RUN_WP wp option update show_on_front page --allow-root
              \$RUN_WP wp option update page_on_front \"\$ID_ACCUEIL\" --allow-root
            fi
            \$RUN_WP wp rewrite structure '/%postname%/' --allow-root
            \$RUN_WP wp rewrite flush --allow-root

            echo '📝 Injection du contenu (content-pages → WordPress)...'
            \$RUN_WP wp eval-file /app/scripts/update-pages-content.php --allow-root

            echo '🔗 Mise à jour des URLs du site (pour que le CSS/JS se chargent correctement)...'
            \$RUN_WP wp option update home \"$SITE_URL\" --allow-root
            \$RUN_WP wp option update siteurl \"$SITE_URL\" --allow-root
            \$RUN_WP wp cache flush --allow-root 2>/dev/null || true

            echo '✅ Site conçu déployé (thème + contenu + URLs)'
          "
          if [ -z "$WP_ADMIN_PASSWORD" ]; then
            echo "⚠️ Définir le secret WORDPRESS_ADMIN_PASSWORD pour un mot de passe admin fixe (sinon généré à chaque 1ère install)."
          fi

      - name: Health check
        env:
          ENV: ${{ steps.env.outputs.env }}
        run: |
          if [ "$ENV" = "test" ]; then
            URL="http://$AZURE_HOST:8080"
          else
            URL="http://$AZURE_HOST"
          fi
          echo "⏳ Attente démarrage (25s)..."
          sleep 25
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 "$URL" || echo "000")
          echo "HTTP $URL → $STATUS"
          if [[ "$STATUS" =~ ^(200|301|302)$ ]]; then
            echo "✅ Site accessible"
          else
            echo "⚠️ Réponse $STATUS (vérifier le site ou le 1er déploiement)"
          fi

      - name: Notify
        run: |
          ENV="${{ steps.env.outputs.env }}"
          if [ "$ENV" = "test" ]; then
            echo "✅ [TEST] déployé → http://$AZURE_HOST:8080"
          else
            echo "✅ [PRODUCTION] déployé → http://$AZURE_HOST"
          fi
