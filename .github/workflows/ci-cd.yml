name: CI/CD — Docker Compose to Azure VM

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Optional environment override: test or production'
        required: false
        default: ''

env:
  IMAGE_NAME: "${{ github.event.repository.name }}"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ${{ secrets.REGISTRY }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      AZURE_VM_HOST: ${{ secrets.AZURE_VM_HOST }}
      AZURE_VM_USER: ${{ secrets.AZURE_VM_USER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine environment (test vs production)
        id: determine-env
        run: |
          # precedence: workflow_dispatch input -> branch name
          if [ "${{ github.event.inputs.environment }}" != "" ]; then
            env_name="${{ github.event.inputs.environment }}"
          elif [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            env_name=production
          else
            env_name=test
          fi
          echo "env=${env_name}" >> $GITHUB_OUTPUT

      - name: Set image tag
        id: set-tag
        run: |
          short_sha=$(echo "${GITHUB_SHA}" | cut -c1-7)
          timestamp=$(date +%s)
          # test uses short-sha, production uses run number
          if [ "${{ steps.determine-env.outputs.env }}" = "test" ]; then
            tag="${short_sha}"
          else
            tag="prod-${GITHUB_RUN_NUMBER}"
          fi
          echo "image_tag=${tag}" >> $GITHUB_OUTPUT

      - name: Login to registry (Docker Hub / generic registry)
        if: ${{ secrets.AZURE_CREDENTIALS == '' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}



      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.set-tag.outputs.image_tag }}

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ env.AZURE_VM_HOST }} >> ~/.ssh/known_hosts

      - name: Copy compose files and deploy script to VM
        run: |
          REMOTE_DIR="/home/${{ env.AZURE_VM_USER }}/deploy"
          ssh ${{ env.AZURE_VM_USER }}@${{ env.AZURE_VM_HOST }} "mkdir -p ${REMOTE_DIR}"
          scp docker-compose.yml ${{ env.AZURE_VM_USER }}@${{ env.AZURE_VM_HOST }}:${REMOTE_DIR}/docker-compose.yml
          # copy optional environment override file if present
          if [ -f "docker-compose.${{ steps.determine-env.outputs.env }}.yml" ]; then
            scp docker-compose.${{ steps.determine-env.outputs.env }}.yml ${{ env.AZURE_VM_USER }}@${{ env.AZURE_VM_HOST }}:${REMOTE_DIR}/
          fi
          scp scripts/remote-deploy.sh ${{ env.AZURE_VM_USER }}@${{ env.AZURE_VM_HOST }}:${REMOTE_DIR}/remote-deploy.sh

      - name: Execute remote deploy
        env:
          ENVIRONMENT: ${{ steps.determine-env.outputs.env }}
          IMAGE_TAG: ${{ steps.set-tag.outputs.image_tag }}
        run: |
          REMOTE_DIR="/home/${{ env.AZURE_VM_USER }}/deploy"
          ssh ${{ env.AZURE_VM_USER }}@${{ env.AZURE_VM_HOST }} "chmod +x ${REMOTE_DIR}/remote-deploy.sh && cd ${REMOTE_DIR} && \
            REGISTRY='${{ env.REGISTRY }}' \
            REGISTRY_USERNAME='${{ env.REGISTRY_USERNAME }}' \
            REGISTRY_PASSWORD='${{ env.REGISTRY_PASSWORD }}' \
            IMAGE_NAME='${{ env.IMAGE_NAME }}' \
            IMAGE_TAG='${{ steps.set-tag.outputs.image_tag }}' \
            ENVIRONMENT='${{ steps.determine-env.outputs.env }}' \
            ./remote-deploy.sh"

      - name: Notify
        run: |
          echo "Deployed ${{ steps.determine-env.outputs.env }} - image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.set-tag.outputs.image_tag }}"
